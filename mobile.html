<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container" id="app-container">
        
        <div id="color-phase" class="phase-container active">
            <h1>Select Your Color</h1>
            <div class="color-grid" id="color-grid"></div>
        </div>

        <div id="team-phase" class="phase-container">
            <h1>Select Your Team</h1>
            <p id="team-subtitle" style="font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);"></p>
            <div class="word-grid" id="team-grid"></div>
        </div>

        <div id="gameplay-phase" class="phase-container fullscreen-phase">
            <h1 style="position: absolute; top: 20px;">Swipe & Select</h1>
            <div class="carousel-container fullscreen">
                <div class="carousel fullscreen" id="carousel"></div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Wrong Letter!</div>
    
    <div class="success-overlay" id="success-overlay">
        <div class="giant-letter" id="giant-letter"></div>
    </div>

    <script src="mobile.js"></script>
</body>
</html>
