<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rainbow Columns</title>
    <style>
        /* General Page Styling */
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            background-color: #222;
            color: white;
        }

        /* The Controller (Button Container) */
        #controller {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Button Styling */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            transition: transform 0.1s, filter 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            filter: grayscale(100%);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Specific Button Colors */
        .btn-red { background-color: #ff0000; }
        .btn-orange { background-color: #ffa500; }
        .btn-yellow { background-color: #ffff00; color: #333; text-shadow: none;}
        .btn-green { background-color: #008000; }
        .btn-blue { background-color: #0000ff; }
        .btn-indigo { background-color: #4b0082; }
        .btn-violet { background-color: #ee82ee; color: #333; text-shadow: none; }

        /* The Display Container */
        #display-container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 60vh;
            border: 4px solid #444;
            border-radius: 10px;
            background-color: #111;
            align-items: flex-end; /* Aligns items to the bottom so they grow upwards */
            overflow: hidden;
        }

        /* Individual Column Styling */
        .column {
            flex: 1; /* Ensures all columns share the container width equally */
            height: 0; /* Starts at 0 height for the animation */
            transition: height 1.5s ease-out; /* The gradual fill animation */
            border-right: 1px solid rgba(0,0,0,0.2);
        }

        .column:last-child {
            border-right: none;
        }
    </style>
</head>
<body>

    <h2>Rainbow Controller</h2>

    <div id="controller">
        <button class="btn-red" onclick="addColumn('#ff0000', this)">Red</button>
        <button class="btn-orange" onclick="addColumn('#ffa500', this)">Orange</button>
        <button class="btn-yellow" onclick="addColumn('#ffff00', this)">Yellow</button>
        <button class="btn-green" onclick="addColumn('#008000', this)">Green</button>
        <button class="btn-blue" onclick="addColumn('#0000ff', this)">Blue</button>
        <button class="btn-indigo" onclick="addColumn('#4b0082', this)">Indigo</button>
        <button class="btn-violet" onclick="addColumn('#ee82ee', this)">Violet</button>
    </div>

    <div id="display-container">
        </div>

    <script>
        const container = document.getElementById('display-container');
        let columnsAdded = 0;

        function addColumn(colorHex, buttonElement) {
            // Stop if we already have 7 columns
            if (columnsAdded >= 7) {
                return; 
            }

            // Disable the clicked button so it can't be used again
            buttonElement.disabled = true;

            // 1. Create the new column div
            const newColumn = document.createElement('div');
            newColumn.classList.add('column');
            newColumn.style.backgroundColor = colorHex;

            // 2. Add it to the container (it appears on the right of existing columns)
            container.appendChild(newColumn);

            // 3. Trigger the growth animation
            // We use a tiny setTimeout to ensure the browser registers the height: 0 first
            setTimeout(() => {
                newColumn.style.height = '100%';
            }, 50);

            columnsAdded++;
        }
    </script>
</body>
</html>
