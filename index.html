<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Display</title>
    <style>
        /* Reset to fill the full screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #111;
        }

        /* The Display Container */
        #display-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end; /* Grow from the bottom up */
        }

        /* Individual Column Styling */
        .column {
            flex: 1; /* Distributes width evenly */
            height: 0; /* Starts at 0 for animation */
            transition: height 1.5s ease-out;
        }
    </style>
</head>
<body>

    <div id="display-container"></div>

    <script>
        const container = document.getElementById('display-container');
        let columnsAdded = 0;

        // Clear any old data when the page loads
        localStorage.removeItem('rainbowCommand');

        // Listen for messages from the controller page
        window.addEventListener('storage', function(event) {
            // Check if the signal we received is the 'rainbowCommand'
            if (event.key === 'rainbowCommand' && event.newValue) {
                // We appended a timestamp to make every event unique, 
                // so we split it to get just the color hex code
                const colorHex = event.newValue.split('|')[0];
                addColumn(colorHex);
            }
        });

        function addColumn(colorHex) {
            if (columnsAdded >= 7) return;

            const newColumn = document.createElement('div');
            newColumn.classList.add('column');
            newColumn.style.backgroundColor = colorHex;

            container.appendChild(newColumn);

            // Trigger the animation
            setTimeout(() => {
                newColumn.style.height = '100%';
            }, 50);

            columnsAdded++;
        }
    </script>
</body>
</html>
